<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="../css/login.css" >
    <link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
			rel="stylesheet" />
</head>
<body>
    <section class="container">
        <div class="container1">
            <button class="login"><img src="../imagens/login.jpg" alt="login" class="img">Login</button>
         <div class="container2">
            <form action="#" method="post">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="E-mail">
                <label for="pwd">Senha</label>
                <input type="password" id="pwd" name="pwd" placeholder="Senha">
                <a href="#">Esqueci minha senha</a>
                <button type="submit" value="Entrar" class="button">Entrar</button>

            </form>
          </div>
            <div class="container3">
            <p class="ct3">OU</p>
            </div>
          <div class="container4">
            <button class="ct4"><img src="../imagens/google.jpg" alt="Google" class="img-ct4">Continue com o google</button>
          </div>
          <div class="container5">
            <p>Não tem conta? <a href="register.html#login">Cadastre-se</a></p>
          </div>
    
        </div>

    </section>
</body>
</html>
