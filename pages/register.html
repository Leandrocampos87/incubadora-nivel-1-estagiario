<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>
    <section class="container" id="login">
        <div class="container1">
            <button class="btn"><img src="../imagens/cadastro.jpg" alt="cadastro">Cadastro</button>
    
           <div class="container2">
             <form action="#" method="post">
               <label for="nome">Nome Completo</label>
               <input type="text" id="nome" name="nome" placeholder="Nome Completo">
               <label for="email">Email</label>
               <input type="email" id="email" name="email" placeholder="Email">
               <label for="senha">Senha</label>
               <input type="password" id="senha" name="senha" placeholder="Senha">
               <label for="confirma-senha">Confirma senha</label>
               <input type="password" id="confirma-senha" name="confirma-senha" placeholder="Confirma senha">
               <label for="telefone">Telefone</label>
               <input type="tel" id="telefone" name="telefone" placeholder="Telefone">
               <input type="submit" value="Cadastrar" class="btn1">
             </form>
           </div>
           <div class="container3">
            <form action="#" method="post">
               <input type="checkbox" id="termos" name="termos" required class="termos">
               <label for="termos">Li e aceito os <a href="#">termos e condições</a></label>
            </form>
           </div>
      </div>
    </section>
</body>
</html>
